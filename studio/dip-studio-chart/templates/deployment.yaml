apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- toYaml .Values.labels.deployment | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- toYaml .Values.labels.pod | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- toYaml .Values.labels.pod | nindent 8 }}
    spec:
      volumes:
        - name: openclaw-state
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-state
        - name: openclaw-workspace
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-workspace
      containers:
        - name: openclaw-gateway
          image: "{{ .Values.image.openclaw.registry }}/{{ .Values.image.openclaw.repository }}:{{ .Values.image.openclaw.tag }}"
          imagePullPolicy: {{ .Values.image.openclaw.pullPolicy }}
          ports:
            - containerPort: {{ .Values.openclaw.port }}
              name: openclaw-ws
              protocol: TCP
          env:
            - name: OPENCLAW_GATEWAY_AUTH_MODE
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: OPENCLAW_GATEWAY_AUTH_MODE
            - name: OPENCLAW_GATEWAY_BIND
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: OPENCLAW_GATEWAY_BIND
            - name: OPENCLAW_STATE_DIR
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: OPENCLAW_STATE_DIR
            - name: OPENCLAW_CONFIG_PATH
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: OPENCLAW_CONFIG_PATH
            - name: OPENCLAW_WORKSPACE_DIR
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: OPENCLAW_WORKSPACE_DIR
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-secret
                  key: OPENCLAW_GATEWAY_TOKEN
          resources:
            {{- toYaml .Values.resources.openclaw | nindent 12 }}
          volumeMounts:
            - name: openclaw-state
              mountPath: /data/openclaw/state
            - name: openclaw-workspace
              mountPath: /data/openclaw/workspace
        - name: dip-studio
          image: "{{ .Values.image.studio.registry }}/{{ .Values.image.studio.repository }}:{{ .Values.image.studio.tag }}"
          imagePullPolicy: {{ .Values.image.studio.pullPolicy }}
          ports:
            - containerPort: {{ .Values.studio.port }}
              name: studio-http
              protocol: TCP
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: PORT
            - name: OAUTH_MOCK_USER_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: OAUTH_MOCK_USER_ID
            - name: OPENCLAW_GATEWAY_PROTOCOL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: OPENCLAW_GATEWAY_PROTOCOL
            - name: OPENCLAW_GATEWAY_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: OPENCLAW_GATEWAY_HOST
            - name: OPENCLAW_GATEWAY_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: OPENCLAW_GATEWAY_PORT_STUDIO
            - name: OPENCLAW_GATEWAY_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: OPENCLAW_GATEWAY_TIMEOUT_MS
            - name: OPENCLAW_WORKSPACE_DIR
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: OPENCLAW_WORKSPACE_DIR_STUDIO
            - name: BKN_BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: BKN_BACKEND_URL
            - name: HYDRA_ADMIN_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: HYDRA_ADMIN_URL
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-secret
                  key: OPENCLAW_GATEWAY_TOKEN
          resources:
            {{- toYaml .Values.resources.studio | nindent 12 }}
          volumeMounts:
            - name: openclaw-workspace
              mountPath: /data/openclaw/workspace
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
